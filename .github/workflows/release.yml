name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: windows-2025
          - os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev libqt6svg6-dev \
            cmake ninja-build \
            libfuse2 librsvg2-bin \
            libsecret-1-dev

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install qt cmake ninja qtkeychain

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)

      - name: Build
        run: cmake --build build --config Release

      # ── Linux ────────────────────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact/Uplink
          cp build/Uplink artifact/Uplink/
          cp -r build/themes artifact/Uplink/
          tar -czf Uplink-${{ github.ref_name }}-linux-x86_64.tar.gz \
              -C artifact Uplink

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        env:
          UPDATE_INFORMATION: "gh-releases-zsync|${{ github.repository_owner }}|${{ github.event.repository.name }}|latest|Uplink-*-x86_64.AppImage.zsync"
        run: bash packaging/build-appimage.sh

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact\Uplink | Out-Null
          Copy-Item build\Release\Uplink.exe artifact\Uplink\
          Copy-Item -Recurse build\Release\themes artifact\Uplink\themes
          $qkcDll = Get-ChildItem -Path build -Recurse -Filter qt6keychain.dll | Select-Object -First 1
          if ($qkcDll) { Copy-Item $qkcDll.FullName "$env:QT_ROOT_DIR\bin\" }
          windeployqt --release artifact\Uplink\Uplink.exe
          Compress-Archive -Path artifact\Uplink\* `
              -DestinationPath Uplink-${{ github.ref_name }}-windows-x64.zip

      # ── macOS ────────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          $(brew --prefix qt)/bin/macdeployqt build/Uplink.app -dmg
          mv build/Uplink.dmg \
              Uplink-${{ github.ref_name }}-macos-${{ runner.arch == 'ARM64' && 'arm64' || 'x86_64' }}.dmg

      # ── Upload ───────────────────────────────────────────────────────────
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            Uplink-${{ github.ref_name }}-*
            Uplink-*.AppImage
            Uplink-*.AppImage.zsync
          generate_release_notes: true

  update-docs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version strings in README and docs
        run: |
          TAG="${{ github.ref_name }}"   # v0.23.1
          VER="${TAG#v}"                 # 0.23.1

          # README.md — download badge hrefs
          sed -i -E "s|Uplink-[0-9]+\.[0-9]+\.[0-9]+-x86_64\.AppImage|Uplink-${VER}-x86_64.AppImage|g" README.md
          sed -i -E "s|Uplink-v[0-9]+\.[0-9]+\.[0-9]+-linux-x86_64\.tar\.gz|Uplink-${TAG}-linux-x86_64.tar.gz|g" README.md
          sed -i -E "s|Uplink-v[0-9]+\.[0-9]+\.[0-9]+-windows-x64\.zip|Uplink-${TAG}-windows-x64.zip|g" README.md
          sed -i -E "s|Uplink-v[0-9]+\.[0-9]+\.[0-9]+-macos-arm64\.dmg|Uplink-${TAG}-macos-arm64.dmg|g" README.md

          # docs/index.html — download card hrefs
          sed -i -E "s|Uplink-[0-9]+\.[0-9]+\.[0-9]+-x86_64\.AppImage|Uplink-${VER}-x86_64.AppImage|g" docs/index.html
          sed -i -E "s|Uplink-v[0-9]+\.[0-9]+\.[0-9]+-windows-x64\.zip|Uplink-${TAG}-windows-x64.zip|g" docs/index.html
          sed -i -E "s|Uplink-v[0-9]+\.[0-9]+\.[0-9]+-macos-arm64\.dmg|Uplink-${TAG}-macos-arm64.dmg|g" docs/index.html

          # docs/index.html — display version strings (nav, hero, section title, footer)
          sed -i -E "s|(Uplink <span>)v[0-9]+\.[0-9]+\.[0-9]+(</span>)|\1${TAG}\2|" docs/index.html
          sed -i -E "s|(Download )v[0-9]+\.[0-9]+\.[0-9]+|\1${TAG}|g" docs/index.html
          sed -i -E "s|v[0-9]+\.[0-9]+\.[0-9]+ — Latest release|${TAG} — Latest release|" docs/index.html
          sed -i -E "s|(class=\"version-tag\">)v[0-9]+\.[0-9]+\.[0-9]+(</div>)|\1${TAG}\2|" docs/index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add README.md docs/index.html
          git commit -m "docs: bump download links to ${{ github.ref_name }}"
          git push origin main
