name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: windows-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev libqt6svg6-dev \
            cmake ninja-build

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install qt cmake ninja

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)

      - name: Build
        run: cmake --build build --config Release

      # ── Linux ────────────────────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifact/UplinkIRC
          cp build/UplinkIRC artifact/UplinkIRC/
          cp -r build/themes artifact/UplinkIRC/
          tar -czf UplinkIRC-${{ github.ref_name }}-linux-x86_64.tar.gz \
              -C artifact UplinkIRC

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact\UplinkIRC | Out-Null
          Copy-Item build\Release\UplinkIRC.exe artifact\UplinkIRC\
          Copy-Item -Recurse build\Release\themes artifact\UplinkIRC\themes
          windeployqt --release artifact\UplinkIRC\UplinkIRC.exe
          Compress-Archive -Path artifact\UplinkIRC\* `
              -DestinationPath UplinkIRC-${{ github.ref_name }}-windows-x64.zip

      # ── macOS ────────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          $(brew --prefix qt)/bin/macdeployqt build/UplinkIRC.app -dmg
          mv build/UplinkIRC.dmg \
              UplinkIRC-${{ github.ref_name }}-macos-${{ runner.arch == 'ARM64' && 'arm64' || 'x86_64' }}.dmg

      # ── Upload ───────────────────────────────────────────────────────────
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: UplinkIRC-${{ github.ref_name }}-*
          generate_release_notes: true
