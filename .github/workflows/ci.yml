name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: windows-2025
          - os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev libqt6svg6-dev \
            cmake ninja-build \
            libsecret-1-dev

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        run: brew install qt cmake ninja qtkeychain

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)

      - name: Build
        run: cmake --build build --config Release

  sanitize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev libqt6svg6-dev \
            cmake ninja-build \
            libsecret-1-dev

      - name: Configure with ASan/UBSan
        run: |
          cmake -B build-sanitize -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUPLINK_ENABLE_SANITIZERS=ON

      - name: Build with sanitizers
        run: cmake --build build-sanitize

      - name: Run tests with sanitizers
        run: ctest --test-dir build-sanitize --output-on-failure
