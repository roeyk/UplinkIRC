# DojoIRC Theme — dark
# A clean minimal dark theme with no color tinting.

[general]
background   = "#0d0d0d"
text         = "#e0e0e0"
border       = "#2a2a2a"
accent       = "#4a9eff"

[sidebar]
background   = "#111111"
text         = "#666666"
active       = "#e0e0e0"
unread       = "#4a9eff"
mention      = "#ff6b6b"
server       = "#444444"

[buffer]
background   = "#0d0d0d"
timestamp    = "#444444"
server_line  = "#3a3a3a"
action       = "#b39ddb"
nick_self    = "#66bb6a"

[highlights]
mention_bg   = "#1a0d0d"
mention_text = "#ff6b6b"
keyword      = "#ffb74d"

[nicklist]
background   = "#111111"
text         = "#666666"
op           = "#4a9eff"
halfop       = "#b39ddb"
voice        = "#66bb6a"
away         = "#333333"

[input]
background   = "#1a1a1a"
text         = "#e0e0e0"
placeholder  = "#444444"
nick_color   = "#66bb6a"
