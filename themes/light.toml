# DojoIRC Theme — light
# A clean light theme for daytime use.

[general]
background   = "#ffffff"
text         = "#1a1a1a"
border       = "#e0e0e0"
accent       = "#1a6ef5"

[sidebar]
background   = "#f5f5f5"
text         = "#888888"
active       = "#1a1a1a"
unread       = "#1a6ef5"
mention      = "#e53935"
server       = "#aaaaaa"

[buffer]
background   = "#ffffff"
timestamp    = "#aaaaaa"
server_line  = "#cccccc"
action       = "#7b1fa2"
nick_self    = "#2e7d32"

[highlights]
mention_bg   = "#fff3f3"
mention_text = "#e53935"
keyword      = "#e65100"

[nicklist]
background   = "#f5f5f5"
text         = "#888888"
op           = "#1a6ef5"
halfop       = "#7b1fa2"
voice        = "#2e7d32"
away         = "#cccccc"

[input]
background   = "#f0f0f0"
text         = "#1a1a1a"
placeholder  = "#aaaaaa"
nick_color   = "#2e7d32"
