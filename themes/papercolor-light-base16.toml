# PaperColor Light
# Author: Jon Leopard (http://github.com/jonleopard) based on PaperColor Theme (https://github.com/NLKNguyen/papercolor-theme)
# Converted from base16 — https://github.com/tinted-theming/base16-schemes

[general]
background   = "#EEEEEE"
text         = "#444444"
border       = "#008700"
accent       = "#D75F00"

[sidebar]
background   = "#AF0000"
text         = "#5F8700"
active       = "#444444"
unread       = "#D75F00"
mention      = "#BCBCBC"
server       = "#5F8700"

[buffer]
background   = "#EEEEEE"
timestamp    = "#5F8700"
server_line  = "#0087AF"
action       = "#005FAF"
nick_self    = "#8700AF"
separator    = "#008700"

[highlights]
mention_bg   = "#AF0000"
mention_text = "#BCBCBC"
keyword      = "#D70000"

[nicklist]
background   = "#AF0000"
text         = "#5F8700"
op           = "#D75F00"
halfop       = "#005FAF"
voice        = "#8700AF"
away         = "#008700"

[input]
background   = "#AF0000"
text         = "#444444"
placeholder  = "#5F8700"
nick_color   = "#8700AF"
