# Spacemacs
# Author: Nasser Alshammari (https://github.com/nashamri/spacemacs-theme)
# Converted from base16 — https://github.com/tinted-theming/base16-schemes

[general]
background   = "#1F2022"
text         = "#A3A3A3"
border       = "#444155"
accent       = "#4F97D7"

[sidebar]
background   = "#282828"
text         = "#585858"
active       = "#A3A3A3"
unread       = "#4F97D7"
mention      = "#F2241F"
server       = "#585858"

[buffer]
