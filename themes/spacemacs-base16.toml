[highlights]
mention_bg   = "#282828"
mention_text = "#F2241F"
keyword      = "#FFA500"

[nicklist]
background   = "#282828"
text         = "#585858"
op           = "#4F97D7"
halfop       = "#A31DB1"
voice        = "#67B11D"
away         = "#444155"

[input]
background   = "#282828"
text         = "#A3A3A3"
placeholder  = "#585858"
nick_color   = "#67B11D"
