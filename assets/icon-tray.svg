<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Uplink logo</title>
  <desc id="desc">Vector logo for the Uplink IRCv3 client.</desc>

  <defs>
    <linearGradient id="uBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13B6FF"/>
      <stop offset="48%" stop-color="#126CFF"/>
      <stop offset="100%" stop-color="#0347D8"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2747"/>
      <stop offset="100%" stop-color="#06162C"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B64FF"/>
      <stop offset="55%" stop-color="#15B9FF"/>
      <stop offset="100%" stop-color="#4DE7FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#06162C" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g transform="translate(42 60) scale(.84)">
  <g id="uplinkMark">
    <!-- Bold U body -->
    <path d="M96 120 H168 V303 C168 357 201 388 256 388 C311 388 344 357 344 303 V120 H416 V306 C416 407 353 464 256 464 C159 464 96 407 96 306 Z" fill="#071B33"/>
    <!-- subtle inner shine -->
    <path d="M128 142 H160 V302 C160 370 197 410 256 410 C315 410 352 370 352 302 V142 H384 V302 C384 389 334 432 256 432 C178 432 128 389 128 302 Z" fill="none" stroke="#67D8FF" stroke-opacity="0.20" stroke-width="10"/>
    <!-- tower mast -->
    <path d="M256 148 L316 350 H196 Z" fill="#071B33"/>
    <path d="M256 182 L296 350 H216 Z" fill="#FFFFFF" opacity="0.90"/>
    <path d="M256 190 L286 350 H226 Z" fill="#071B33"/>
    <path d="M221 323 L291 253 M291 323 L221 253 M235 282 L277 224 M277 282 L235 224" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.92"/>
    <circle cx="256" cy="128" r="27" fill="#071B33"/>
    <!-- signal arcs -->
    <path d="M191 87 C228 51 284 51 321 87" fill="none" stroke="#071B33" stroke-width="18" stroke-linecap="round"/>
    <path d="M155 51 C211 -5 301 -5 357 51" fill="none" stroke="#071B33" stroke-width="18" stroke-linecap="round"/>
    <path d="M119 15 C195 -61 317 -61 393 15" fill="none" stroke="#071B33" stroke-width="18" stroke-linecap="round" opacity="0.95"/>
    <!-- chat bubble -->
    <path d="M169 353 C169 329 190 311 219 311 H293 C322 311 343 329 343 353 C343 377 322 395 293 395 H242 L203 425 L209 393 C186 389 169 373 169 353 Z" fill="#FFFFFF"/>
    <circle cx="225" cy="354" r="9" fill="#071B33"/>
    <circle cx="256" cy="354" r="9" fill="#071B33"/>
    <circle cx="287" cy="354" r="9" fill="#071B33"/>
  </g></g>
</svg>
