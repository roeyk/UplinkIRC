<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="nr-title nr-desc">
  <title id="nr-title">NodeRelay</title>
  <desc id="nr-desc">NodeRelay — fast, secure IRCv3 client. Tower icon with wordmark.</desc>

  <defs>
    <linearGradient id="tg" x1="180" y1="760" x2="840" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e72ff"/>
      <stop offset=".5" stop-color="#08c4ff"/>
      <stop offset="1" stop-color="#28efd0"/>
    </linearGradient>
    <filter id="tshadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a4a8c" flood-opacity=".22"/>
    </filter>
    <clipPath id="bg-clip">
      <rect width="1200" height="400" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="18" fill="#0D1B2E"/>

  <!-- Tower icon: 280×280, centered vertically in 400px canvas (y=60), x=20 -->
  <g transform="translate(20,60) scale(0.2734)" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#tshadow)">
    <path d="M260 780 512 214 764 780" stroke="#fff" stroke-width="38"/>
    <path d="M390 486h244M350 604h324M308 724h408M432 486l160 118M592 486 432 604M384 604l256 120M640 604 384 724" stroke="#fff" stroke-width="20"/>
    <path d="M338 310 512 204 686 310M258 420 380 352M766 420 644 352M258 604 380 536M766 604 644 536M365 814 512 746 659 814" stroke="url(#tg)" stroke-width="26"/>
    <path d="M350 291a236 236 0 0 1 324 0M410 360a148 148 0 0 1 204 0M458 426a72 72 0 0 1 108 0" stroke="url(#tg)" stroke-width="28"/>
    <path d="M512 206V118" stroke="url(#tg)" stroke-width="24"/>
    <g fill="#fff" stroke="url(#tg)" stroke-width="26">
      <circle cx="512" cy="96"  r="44"/>
      <circle cx="220" cy="380" r="52"/>
      <circle cx="220" cy="632" r="52"/>
      <circle cx="804" cy="380" r="52"/>
      <circle cx="804" cy="632" r="52"/>
      <circle cx="512" cy="902" r="52"/>
    </g>
    <path d="M312 488l70 38M712 488l-70 38M325 560l70-42M699 560l-70-42M512 790v64" stroke="url(#tg)" stroke-width="22" stroke-dasharray="1 28"/>
  </g>

  <!-- Wordmark -->
  <text x="330" y="218"
        font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="114" font-weight="800" letter-spacing="-4"
        fill="#ffffff">NodeRelay</text>

  <!-- Tagline -->
  <text x="336" y="278"
        font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="28" font-weight="400"
        fill="#6B8DB0">IRCv3 Client</text>
  <circle cx="516" cy="266" r="5" fill="#08c4ff"/>
  <text x="532" y="278"
        font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="28" font-weight="400"
        fill="#6B8DB0">Secure</text>
  <circle cx="644" cy="266" r="5" fill="#08c4ff"/>
  <text x="660" y="278"
        font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="28" font-weight="400"
        fill="#6B8DB0">Fast</text>
  <circle cx="740" cy="266" r="5" fill="#08c4ff"/>
  <text x="756" y="278"
        font-family="Inter, Segoe UI, Helvetica Neue, Arial, sans-serif"
        font-size="28" font-weight="400"
        fill="#6B8DB0">Lightweight</text>

</svg>
