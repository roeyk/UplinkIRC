<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">NodeRelay Node N Icon</title>
  <desc id="desc">A stylized N made from connected network nodes with relay signal arcs.</desc>
  <defs>
    <linearGradient id="blueTeal" x1="170" y1="850" x2="850" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1268ff"/>
      <stop offset="0.48" stop-color="#13b9ff"/>
      <stop offset="1" stop-color="#24f0cf"/>
    </linearGradient>
    <linearGradient id="leftGrad" x1="245" y1="180" x2="245" y2="845" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28d8ff"/>
      <stop offset="1" stop-color="#0874ff"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="785" y1="180" x2="785" y2="845" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#31f4d2"/>
      <stop offset="1" stop-color="#10bea8"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.03 0 0 0 0 0.75 0 0 0 0 1 0 0 0 .45 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .stroke{fill:none;stroke-linecap:round;stroke-linejoin:round}.nodeHole{fill:#fff}.inner{fill:url(#blueTeal)}
    </style>
  </defs>
  <g filter="url(#softGlow)">
    <path class="stroke" d="M122 575c-54-70-54-156 0-226" stroke="#139dff" stroke-width="24"/>
    <path class="stroke" d="M176 540c-34-46-34-108 0-154" stroke="#2edcff" stroke-width="22"/>
    <circle cx="224" cy="462" r="22" fill="#0f9cff"/>
    <path class="stroke" d="M902 575c54-70 54-156 0-226" stroke="#21dcc8" stroke-width="24"/>
    <path class="stroke" d="M848 540c34-46 34-108 0-154" stroke="#30f0cf" stroke-width="22"/>
    <circle cx="800" cy="462" r="22" fill="#19dac3"/>
    <rect x="252" y="246" width="84" height="532" rx="42" fill="url(#leftGrad)"/>
    <rect x="688" y="246" width="84" height="532" rx="42" fill="url(#rightGrad)"/>
    <path d="M327 254 L704 651" stroke="url(#blueTeal)" stroke-width="92" stroke-linecap="round"/>
    <path d="M345 273 L686 632" stroke="#61f7ff" stroke-width="16" stroke-linecap="round" opacity=".55"/>
    <g>
      <circle cx="294" cy="228" r="82" fill="url(#blueTeal)"/>
      <circle cx="294" cy="228" r="49" class="nodeHole"/>
      <circle cx="294" cy="228" r="29" fill="#11b9f8"/>
      <circle cx="294" cy="796" r="82" fill="#0874ff"/>
      <circle cx="294" cy="796" r="49" class="nodeHole"/>
      <circle cx="294" cy="796" r="29" fill="#0599fb"/>
      <circle cx="730" cy="228" r="82" fill="#24f0cf"/>
      <circle cx="730" cy="228" r="49" class="nodeHole"/>
      <circle cx="730" cy="228" r="29" fill="#1bd6c0"/>
      <circle cx="730" cy="796" r="82" fill="#13d5bd"/>
      <circle cx="730" cy="796" r="49" class="nodeHole"/>
      <circle cx="730" cy="796" r="29" fill="#11c9b4"/>
      <circle cx="512" cy="512" r="74" fill="url(#blueTeal)"/>
      <circle cx="512" cy="512" r="43" class="nodeHole"/>
      <circle cx="512" cy="512" r="27" fill="#0c9dff"/>
    </g>
  </g>
</svg>
